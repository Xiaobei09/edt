name: Upstream Sync (Force with .github kept)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  force_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Backup .github
        run: |
          if [ -d .github ]; then
            cp -r .github /tmp/dotgithub-backup
            echo "✅ .github backed up"
          else
            echo "⚠️ No .github directory found, nothing to back up"
          fi

      - name: Fetch upstream and force reset
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream main
          git reset --hard upstream/main
          echo "✅ Reset to upstream/main"

      - name: Restore .github
        run: |
          rm -rf .github
          if [ -d /tmp/dotgithub-backup ]; then
            cp -r /tmp/dotgithub-backup .github
            echo "✅ .github restored"
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Restore custom .github after upstream sync"
            echo "✅ Committed restored .github"
          fi

      - name: Force push
        run: |
          git push --force origin main